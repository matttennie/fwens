name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE TO MAINTAINER: It is strongly recommended to enable branch protection on the 'main'
# branch in GitHub Settings, requiring the 'build-and-test' job to pass before merging.

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Security Audit
        run: npm audit --audit-level=high
